name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: tradelink_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements/development.txt
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 apps config utils --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 apps config utils --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Run migrations
      env:
        DB_ENGINE: django.db.backends.postgresql
        DB_NAME: tradelink_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_HOST: localhost
        DB_PORT: 5432
      run: |
        python manage.py migrate
    
    - name: Run tests with pytest
      env:
        DB_ENGINE: django.db.backends.postgresql
        DB_NAME: tradelink_test
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_HOST: localhost
        DB_PORT: 5432
        REDIS_URL: redis://localhost:6379/0
      run: |
        python -m pytest tests/ -v --cov=apps --cov-report=xml --cov-report=term-missing
    
    - name: Check Django deployment settings
      env:
        DJANGO_SETTINGS_MODULE: config.settings.development
      run: |
        python manage.py check --deploy --settings=config.settings.production || true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Code Quality Report
      run: |
        echo "Test Coverage Report Generated"
        echo "Coverage report available in artifacts"
        echo ""
        echo "Deployment Domain: azizdali.uz"
        echo "API Endpoint: https://api.azizdali.uz/api/v1"
        echo "Admin Panel: https://api.azizdali.uz/admin"

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run Bandit security check
      run: |
        bandit -r apps config utils --exit-zero || true
    
    - name: Check for known vulnerabilities
      run: |
        safety check --json || true

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort pylint
    
    - name: Check code formatting with Black
      run: |
        black --check apps config utils --exit-zero || true
    
    - name: Check import sorting with isort
      run: |
        isort --check-only apps config utils --exit-code || true

  build:
    runs-on: ubuntu-latest
    needs: [test, security, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Build Docker image
      run: |
        docker build -t tradelink:${{ github.sha }} .
        docker tag tradelink:${{ github.sha }} tradelink:latest
    
    - name: Echo build success
      run: |
        echo "✓ Build successful - ready for deployment"
        echo "Image: tradelink:${{ github.sha }}"
