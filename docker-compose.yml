version: '3.9'

services:
  # PostgreSQL Database with PostGIS Extension
  db:
    image: postgis/postgis:15-3.4
    container_name: tradelink_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tradelink}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tradelink}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradelink_network

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: tradelink_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradelink_network

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradelink_web
    restart: unless-stopped
    entrypoint: /app/entrypoint.sh
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      - DATABASE_URL=postgis://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-tradelink}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - JWT_ACCESS_TOKEN_LIFETIME_MINUTES=${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-15}
      - JWT_REFRESH_TOKEN_LIFETIME_DAYS=${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-30}
      - FIREBASE_CREDENTIALS_PATH=${FIREBASE_CREDENTIALS_PATH:-./config/firebase-credentials.json}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - SMS_API_KEY=${SMS_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SUPERUSER_USERNAME=${SUPERUSER_USERNAME:-admin}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-admin123}
      - SUPERUSER_EMAIL=${SUPERUSER_EMAIL:-admin@azizdali.uz}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tradelink_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradelink_celery
    restart: unless-stopped
    command: celery -A config worker -l info --concurrency=4
    volumes:
      - .:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      - DATABASE_URL=postgis://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-tradelink}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - FIREBASE_CREDENTIALS_PATH=${FIREBASE_CREDENTIALS_PATH:-./config/firebase-credentials.json}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - SMS_API_KEY=${SMS_API_KEY:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      - db
      - redis
    networks:
      - tradelink_network

  # Celery Beat Scheduler (for periodic tasks)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradelink_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      - DEBUG=${DEBUG:-False}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - DATABASE_URL=postgis://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-tradelink}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - tradelink_network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: tradelink_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # For SSL certificates (if using production)
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - tradelink_network

  # pgAdmin for Database Management (Optional - Development only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tradelink_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@azizdali.uz}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - tradelink_network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  tradelink_network:
    driver: bridge
